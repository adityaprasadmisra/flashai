<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FlashAI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

  <!-- WebGL Shader Canvas -->
  <canvas id="shader-canvas"></canvas>

  <!-- Noise overlay -->
  <div class="noise-overlay"></div>

  <!-- Nav -->
  <nav class="navbar">
    <a href="/" class="nav-logo">FLASH<em>AI</em></a>
    <div class="nav-status">
      <span class="status-dot"></span>
      <span>Local · Ollama</span>
    </div>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  <footer class="footer">
    <span>FlashAI © 2025</span>
    <span>Flask + Llama 3 · Runs locally</span>
  </footer>

  <script src="{{ url_for('static', filename='js/shader.js') }}"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
